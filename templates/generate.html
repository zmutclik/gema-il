<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Data - {{ username }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 16px; }
        .container { max-width: 600px; margin: 20px auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 10px; color: #333; font-size: 22px; }
        p { color: #666; margin-bottom: 20px; font-size: 14px; }
        .back { display: inline-block; margin-bottom: 16px; color: #4a90d9; text-decoration: none; font-size: 14px; min-height: 44px; line-height: 44px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input[type="number"], input[type="text"], textarea {
            width: 100%; padding: 12px 14px; border: 1px solid #ccc; border-radius: 6px;
            font-size: 16px; /* 16px prevents iOS zoom */ margin-bottom: 16px; font-family: inherit;
        }
        button { padding: 12px 24px; background: #4a90d9; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; min-height: 44px; }
        button:hover { background: #357abd; }
        .msg { margin-bottom: 16px; padding: 12px; border-radius: 6px; font-size: 14px; }
        .msg-ok { background: #d4edda; color: #155724; }
        .msg-err { background: #f8d7da; color: #721c24; }
        .msg-info { background: #cce5ff; color: #004085; }
        .loading { display: none; text-align: center; margin: 20px 0; }
        .loading.active { display: block; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4a90d9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-generate { background: #28a745; color: #fff; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; min-height: 44px; }
        .btn-generate:hover { background: #218838; }
        .btn-generate:disabled { background: #88c999; cursor: not-allowed; }
        .form-section { margin-top: 20px; }
        .form-section label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; font-size: 14px; }
        .form-section input, .form-section textarea { margin-bottom: 16px; }
        .form-section button { margin-top: 4px; }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { margin: 0; border-radius: 8px; padding: 18px; }
            h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/{{ username }}/">← Kembali ke tabel</a>
        <h1>🤖 Generate Data dengan AI</h1>
        <p>Generate data random menggunakan AI langsung ke database.</p>

        {% if message %}
        <div class="msg msg-{{ msg_type }}">{{ message }}</div>
        {% endif %}

        <div class="form-section">
            <label for="genCount">Jumlah Data:</label>
            <input type="number" id="genCount" min="1" max="100" value="10" placeholder="1-100">
            <label for="genPassword">Password:</label>
            <input type="text" id="genPassword" placeholder="Masukkan password">
            <label for="genPrefix">Prefix Email (opsional):</label>
            <input type="text" id="genPrefix" placeholder="Contoh: user → user123@gmail.com">
            <label for="genEmailUtama">Email Utama (opsional):</label>
            <textarea id="genEmailUtama" rows="3" placeholder="Contoh: gmail.com, yahoo.com, outlook.com&#10;Satu domain per baris atau dipisah koma."></textarea>
            <button class="btn-generate" id="btnGenerate" onclick="doGenerate()" style="margin-top: 10px;">🤖 Generate</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color:#666;">AI sedang membuat data... mohon tunggu.</p>
        </div>
    </div>

    <script>
        const username = "{{ username }}";

        async function saveForm() {
            const data = {
                count: document.getElementById('genCount').value,
                password: document.getElementById('genPassword').value,
                prefix: document.getElementById('genPrefix').value,
                emailUtama: document.getElementById('genEmailUtama').value,
            };
            try {
                await fetch('/' + username + '/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
            } catch(e) {}
        }

        async function loadForm() {
            try {
                const resp = await fetch('/' + username + '/settings');
                if (!resp.ok) return;
                const data = await resp.json();
                if (data.count)      document.getElementById('genCount').value = data.count;
                if (data.password)   document.getElementById('genPassword').value = data.password;
                if (data.prefix)     document.getElementById('genPrefix').value = data.prefix;
                if (data.emailUtama) document.getElementById('genEmailUtama').value = data.emailUtama;
            } catch(e) {}
        }

        // Auto-save on any input change (debounced 800ms)
        let saveTimer = null;
        ['genCount','genPassword','genPrefix','genEmailUtama'].forEach(function(id) {
            document.getElementById(id).addEventListener('input', function() {
                clearTimeout(saveTimer);
                saveTimer = setTimeout(saveForm, 800);
            });
        });

        // Restore on page load
        window.addEventListener('DOMContentLoaded', loadForm);

        function showMsg(text, type) {
            const existing = document.querySelector('.msg');
            if (existing) existing.remove();
            const el = document.createElement('div');
            el.className = 'msg msg-' + type;
            el.textContent = text;
            const container = document.querySelector('.container');
            const formSection = document.querySelector('.form-section');
            container.insertBefore(el, formSection);
        }

        async function doGenerate() {
            const count = parseInt(document.getElementById('genCount').value);
            const password = document.getElementById('genPassword').value.trim();
            const prefix = document.getElementById('genPrefix').value.trim();
            const emailUtama = document.getElementById('genEmailUtama').value.trim();

            if (!count || count < 1 || count > 100) {
                alert('Jumlah data harus antara 1 - 100.');
                return;
            }

            if (!password) {
                alert('Password wajib diisi.');
                return;
            }

            // Save form before sending
            saveForm();

            document.getElementById('loading').classList.add('active');
            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;

            try {
                const resp = await fetch('/' + username + '/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: count, password: password, prefix: prefix, email_utama: emailUtama })
                });
                const data = await resp.json();

                if (resp.ok) {
                    showMsg('✅ ' + data.message, 'ok');
                    setTimeout(function() { location.href = '/' + username + '/'; }, 2000);
                } else {
                    showMsg('❌ ' + (data.message || 'Gagal generate'), 'err');
                }
            } catch(err) {
                showMsg('❌ Gagal terhubung ke server atau AI.', 'err');
            } finally {
                document.getElementById('loading').classList.remove('active');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
